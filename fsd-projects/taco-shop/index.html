<!DOCTYPE html>
<html>
    <head>
        <title>Cake Shop</title>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <style>
            #menu, #take-order {
                display: flex;
                flex-direction: row;
            }

            #take-order > p {
                padding-right: 10px;
            }

            .menu-item {
                border: 3px solid gray;
            }

            .menu-item > h4,
            .menu-item > img {
                padding: 10px;
                padding-bottom: 5px;
            }

            img {
                width: 250px;
            }
        </style>
    </head>
    <body>
        <div id="all-contents">
            <nav>
                <h1>Cake Shop</h1>
                <div id="take-order">
                    <p>When you're ready to place your order, click here: </p>
                    <button>Place Order</button>
                </div>
            </nav>
            <main>
                <h3>Menu</h3>
                <div id="menu">
                    <div id="betty-cake" class="menu-item">
                        <h4> #1 - Betty Cake</h4>
                        <img src="https://i.pinimg.com/736x/33/7a/ac/337aacf2f537dc77bccc88eaa1c92fde.jpg">
                        <h4>6.99</h4>
                    </div>
                    <div id="flower-cake" class="menu-item">
                        <h4>#2 - Flower Cake</h4>
                        <img src="https://i.pinimg.com/736x/ba/ba/82/baba8259e3207a5f051b26f66bb1579f.jpg">
                        <h4>9.99</h4>
                    </div>
                    <div id = "kitty-cake" class="menu-item">
                        <h4> #3 - Kitty Cake</h4>
                        <img src="https://i.pinimg.com/736x/74/a9/82/74a982064c5a874fbec835aafe7dc7fe.jpg">
                    </div>
                </div>
            </main>
        </div>
        <script>
            $('button').on('click', takeOrder);
            var total = (0);
            var orderNumber =prompt('What cake would you like to order?')
        </script>
    </body>
</html>
